name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://dolores:dolores@localhost:5433/dolores
      DOLORES_APP_DATABASE_URL: postgresql://dolores_app:dolores@localhost:5433/dolores
      DOLORES_EMBED_MODEL: bge-small-en-v1.5
      DOLORES_MODEL_CACHE: /home/runner/.dolores-models

    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from the `packageManager` field in package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the fastembed ONNX model (~22 MB) to avoid re-downloading on every run.
      # The key is stable — bge-small-en-v1.5 never changes for a given model name.
      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: /home/runner/.dolores-models
          key: fastembed-bge-small-en-v1.5

      # GitHub Actions service containers cannot build from a custom Dockerfile,
      # so we use `docker compose up --build` to get the pg_cron-enabled image.
      - name: Start Postgres (with pgvector + pg_cron)
        run: docker compose up -d --build

      - name: Wait for Postgres to be ready
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T db pg_isready -U dolores -d dolores && break
            echo "Waiting for Postgres... ($i/30)"
            sleep 3
          done

      - name: Build all packages
        run: pnpm build

      # dolores init applies the full schema: pgvector + pg_cron extensions,
      # facts/memories tables, indexes, RLS policies, and the dolores_app role.
      # DATABASE_URL must point to a superuser (dolores) for extension creation.
      - name: Apply database schema
        run: node packages/cli/dist/index.js init --no-docker

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm -r test
